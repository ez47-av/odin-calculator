<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="javascript.js" defer ></script>
</head>
<body>
  <div class="container">
    <div class="display">
      <p id="display-value" class="display-value"></p>
    </div>
    <div class="keypad">
      <button id="seven" class="number" data-value="7">7</button>
      <button id="eight" class="number" data-value="8">8</button>
      <button id="nine" class="number" data-value="9">9</button>
      <button id="divide" class="operator" data-value="divide">&divide;</button>
      <button id="clear" class="clear">C</button>
      <button id="four" class="number" data-value="4">4</button>
      <button id="five" class="number" data-value="5">5</button>
      <button id="six" class="number" data-value="6">6</button>
      <button id="multiply" class="operator" data-value="multiply">x</button>
      <button id="back" class="back">&#8626;</button>
      <button id="one" class="number" data-value="1">1</button>
      <button id="two" class="number" data-value="2">2</button>
      <button id="three" class="number" data-value="3">3</button>
      <button id="subtract" class="operator" data-value="subtract">-</button>
      <button id="plus-minus" class="plus-minus">+/-</button>        
      <button id="zero" class="number" data-value="0">0</button>
      <button id="decimal" class="decimal">.</button>
      <button id="equal" class="equal" data-value="equal">=</button>
      <button id="add" class="operator" data-value="add">+</button>
    </div>
  </div>
</body>
</html>
